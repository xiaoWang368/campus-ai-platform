server:
  port: 8081
spring:
  application:
    name: hmdp
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    #com.mysql.jdbc.Driver
    url: jdbc:mysql://localhost:3306/hmdp
    username: root
    password: 1234
  redis:
    host: localhost
    port: 6379
    lettuce:
      pool:
        max-active: 10
        max-idle: 10
        min-idle: 1
        time-between-eviction-runs: 10s
    database: 0
    password: 1234
  jackson:
    default-property-inclusion: non_null # JSON处理时忽略非空字段
mybatis-plus:
  type-aliases-package: com.hmdp.entity # 别名扫描包
logging:
  level:
    com.hmdp: debug

# Agent RAG 服务配置（HTTP 模式）
agent:
  service:
    url: http://localhost:8000
  grpc:
    host: localhost
    port: 50051