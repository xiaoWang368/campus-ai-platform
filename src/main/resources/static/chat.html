<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能助手 - 校园AI服务平台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .chat-container {
            width: 800px;
            max-width: 90vw;
            height: 80vh;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px 24px;
        }
        .chat-header h1 { font-size: 20px; font-weight: 600; }
        .chat-header p { font-size: 13px; opacity: 0.85; margin-top: 4px; }
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9fc;
        }
        .message {
            margin-bottom: 16px;
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }
        .message.user { flex-direction: row-reverse; }
        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }
        .avatar.bot { background: #667eea; color: white; }
        .avatar.user { background: #52c41a; color: white; }
        .bubble {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.6;
            word-break: break-word;
        }
        .message.bot .bubble {
            background: white;
            border: 1px solid #e8e8e8;
            border-top-left-radius: 4px;
        }
        .message.user .bubble {
            background: #667eea;
            color: white;
            border-top-right-radius: 4px;
        }
        .sources {
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid #f0f0f0;
            font-size: 12px;
            color: #999;
        }
        .sources span {
            display: inline-block;
            background: #f0f5ff;
            color: #667eea;
            padding: 2px 8px;
            border-radius: 10px;
            margin: 2px 4px 2px 0;
        }
        .input-area {
            padding: 16px 20px;
            border-top: 1px solid #e8e8e8;
            display: flex;
            gap: 10px;
            background: white;
        }
        .input-area input {
            flex: 1;
            padding: 10px 16px;
            border: 1px solid #d9d9d9;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
        }
        .input-area input:focus { border-color: #667eea; }
        .input-area button {
            padding: 10px 24px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: opacity 0.3s;
        }
        .input-area button:hover { opacity: 0.9; }
        .input-area button:disabled { opacity: 0.5; cursor: not-allowed; }
        .loading {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #999;
            font-size: 14px;
            padding: 12px 0;
        }
        .loading .dots { display: flex; gap: 4px; }
        .loading .dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: #667eea;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .loading .dot:nth-child(1) { animation-delay: -0.32s; }
        .loading .dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
        .welcome {
            text-align: center;
            color: #999;
            padding: 40px 20px;
        }
        .welcome h3 { color: #333; margin-bottom: 8px; }
        .welcome .examples {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin-top: 16px;
        }
        .welcome .examples button {
            padding: 6px 14px;
            background: #f0f5ff;
            border: 1px solid #d6e4ff;
            border-radius: 16px;
            color: #667eea;
            cursor: pointer;
            font-size: 13px;
        }
        .welcome .examples button:hover { background: #e6f0ff; }
        .error { color: #ff4d4f; text-align: center; padding: 10px; }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h1>💬 智能店铺助手</h1>
            <p>基于 AI 的店铺推荐与问答系统</p>
        </div>
        <div class="messages" id="messages">
            <div class="welcome">
                <h3>👋 你好！我是智能店铺助手</h3>
                <p>我可以帮你推荐餐厅、查询店铺信息、了解优惠券等</p>
                <div class="examples">
                    <button onclick="askExample(this)">有什么好吃的餐厅推荐？</button>
                    <button onclick="askExample(this)">有哪些便宜的店铺？</button>
                    <button onclick="askExample(this)">附近有没有酒吧？</button>
                    <button onclick="askExample(this)">有哪些优惠券可以用？</button>
                </div>
            </div>
        </div>
        <div class="input-area">
            <input type="text" id="questionInput" placeholder="请输入你的问题..."
                   onkeypress="if(event.key==='Enter') sendQuestion()">
            <button id="sendBtn" onclick="sendQuestion()">发送</button>
        </div>
    </div>

    <script>
        async function sendQuestion() {
            const input = document.getElementById('questionInput');
            const question = input.value.trim();
            if (!question) return;

            input.value = '';
            const messages = document.getElementById('messages');

            // 移除欢迎页
            const welcome = messages.querySelector('.welcome');
            if (welcome) welcome.remove();

            // 添加用户消息
            appendMessage('user', question);

            // 加载状态
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'loading';
            loadingDiv.innerHTML = '<div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div><span>思考中...</span>';
            messages.appendChild(loadingDiv);
            messages.scrollTop = messages.scrollHeight;

            document.getElementById('sendBtn').disabled = true;

            try {
                const response = await fetch('/agent/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question })
                });
                const result = await response.json();

                loadingDiv.remove();

                if (result.success && result.data) {
                    appendMessage('bot', result.data);
                } else {
                    appendMessage('bot', '抱歉，服务暂时不可用，请稍后再试。', true);
                }
            } catch (err) {
                loadingDiv.remove();
                appendMessage('bot', '网络错误，请检查连接后重试。', true);
            } finally {
                document.getElementById('sendBtn').disabled = false;
                input.focus();
            }
        }

        function appendMessage(role, text, isError = false) {
            const messages = document.getElementById('messages');
            const div = document.createElement('div');
            div.className = `message ${role}`;

            const avatar = document.createElement('div');
            avatar.className = `avatar ${role}`;
            avatar.textContent = role === 'bot' ? '🤖' : '👤';

            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            bubble.textContent = text;
            if (isError) bubble.style.color = '#ff4d4f';

            div.appendChild(role === 'bot' ? avatar : bubble);
            div.appendChild(role === 'bot' ? bubble : avatar);

            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
        }

        function askExample(btn) {
            document.getElementById('questionInput').value = btn.textContent;
            sendQuestion();
        }
    </script>
</body>
</html>
