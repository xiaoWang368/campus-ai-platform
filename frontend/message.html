<!DOCTYPE html>
<html lang="en">

<head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
  <title>校园AI服务平台</title>
  <link rel="stylesheet" href="./css/element.css">
  <link href="./css/main.css" rel="stylesheet">

  <style>
    .header{
        width: 100%;
        line-height: 40px;
        height: 6%;
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-bottom: 2px solid #667eea;
    }
    .header-back-btn{
        width: 10%;
        color: #667eea;
        font-size: 22px;
    }
    .header-title {
        width: 90%;
        text-align: center;
        font-size: 18px;
        font-family: Hiragino Sans GB,Arial,Helvetica,"\5B8B\4F53",sans-serif;
    }
    .chat-messages {
        height: 79%;
        overflow-y: auto;
        padding: 15px;
        background: #f8f9fc;
    }
    .message {
        margin-bottom: 16px;
        display: flex;
        align-items: flex-start;
        gap: 10px;
    }
    .message.user { flex-direction: row-reverse; }
    .avatar {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 14px;
        flex-shrink: 0;
        overflow: hidden;
    }
    .avatar.bot { background: linear-gradient(135deg, #667eea, #764ba2); color: white; font-weight: bold; }
    .avatar.user { background: #52c41a; color: white; }
    .avatar img {
        width: 100%;
        height: 100%;
        border-radius: 50%;
    }
    .bubble {
        max-width: 70%;
        padding: 10px 14px;
        border-radius: 12px;
        font-size: 14px;
        line-height: 1.6;
        word-break: break-word;
    }
    .message.bot .bubble {
        background: white;
        border: 1px solid #e8e8e8;
        border-top-left-radius: 4px;
    }
    .message.user .bubble {
        background: #667eea;
        color: white;
        border-top-right-radius: 4px;
    }
    .input-area {
        height: 7%;
        padding: 0 10px;
        border-top: 1px solid #e8e8e8;
        display: flex;
        align-items: center;
        gap: 8px;
        background: white;
    }
    .input-area .el-input { flex: 1; }
    .input-area .el-input__inner {
        border-radius: 18px;
        height: 36px;
        line-height: 36px;
    }
    .input-area .el-button {
        border-radius: 18px;
        background: #667eea;
        border-color: #667eea;
        height: 36px;
        flex-shrink: 0;
    }
    .input-area .el-button:hover { opacity: 0.9; }
    .input-area .el-button.is-disabled { opacity: 0.5; }
    .thinking {
        display: flex;
        align-items: center;
        gap: 4px;
        padding: 4px 0;
    }
    .thinking .dot {
        width: 8px; height: 8px;
        border-radius: 50%;
        background: #667eea;
        animation: bounce 1.4s infinite ease-in-out both;
    }
    .thinking .dot:nth-child(1) { animation-delay: -0.32s; }
    .thinking .dot:nth-child(2) { animation-delay: -0.16s; }
    @keyframes bounce {
        0%, 80%, 100% { transform: scale(0); }
        40% { transform: scale(1); }
    }
    .welcome-msg {
        text-align: center;
        color: #999;
        padding: 30px 20px;
    }
    .welcome-msg h3 { color: #333; margin-bottom: 8px; }
    .welcome-msg p { font-size: 13px; }
  </style>

</head>

<body>
<div id="app">
  <div class="header">
    <div class="header-back-btn" @click="goBack"><i class="el-icon-arrow-left"></i></div>
    <div class="header-title">小v&nbsp;&nbsp;&nbsp;</div>
  </div>

  <div class="chat-messages" id="messageContainer">
    <div class="welcome-msg" v-if="messages.length === 1 && messages[0].content === welcomeText">
      <h3>👋 你好！我是小v</h3>
      <p>校园AI智能助手，集成了AI问答与知识检索能力</p>
    </div>
    <div v-for="(msg, index) in messages" :key="index"
         :class="['message', msg.role === 'user' ? 'user' : 'bot']">
      <div class="avatar bot" v-if="msg.role === 'bot'">v</div>
      <div class="bubble">{{ msg.content }}</div>
      <div class="avatar user" v-if="msg.role === 'user'">
        <img :src="userIcon || ''" alt="">
      </div>
    </div>
    <div v-if="loading" class="message bot">
      <div class="avatar bot">v</div>
      <div class="bubble">
        <div class="thinking">
          <span class="dot"></span><span class="dot"></span><span class="dot"></span>
        </div>
      </div>
    </div>
  </div>

  <div class="input-area">
    <el-input v-model="question" placeholder="请输入您的问题..." @keyup.enter.native="sendMessage" :disabled="loading" size="small"></el-input>
    <el-button type="primary" size="small" @click="sendMessage" :disabled="!question.trim() || loading">发送</el-button>
  </div>

  </div>
<script src="./js/vue.js"></script>
<script src="./js/axios.min.js"></script>
<script src="./js/element.js"></script>
<script src="./js/common.js"></script>
<script>
  const welcomeText = '你好！我是小v，校园AI智能助手，有什么可以帮助你的吗？';
  new Vue({
    el: "#app",
    data: {
      question: '',
      messages: [
        { role: 'bot', content: welcomeText }
      ],
      loading: false,
      userIcon: '',
      welcomeText: welcomeText
    },
    created() {
      this.loadUser();
    },
    methods: {
      loadUser() {
        axios.get("/user/me")
          .then(({data}) => {
            if (data && data.icon) {
              this.userIcon = data.icon;
            }
          })
          .catch(() => {});
      },
      sendMessage() {
        const text = this.question.trim();
        if (!text || this.loading) return;

        this.messages.push({ role: 'user', content: text });
        this.question = '';
        this.loading = true;
        this.$nextTick(() => this.scrollToBottom());

        axios.post("/agent/chat", { question: text })
          .then(({data}) => {
            this.messages.push({ role: 'bot', content: data || '抱歉，没有获取到回复。' });
          })
          .catch((err) => {
            this.messages.push({ role: 'bot', content: typeof err === 'string' ? err : '抱歉，我遇到了一些问题，请稍后再试。' });
          })
          .finally(() => {
            this.loading = false;
            this.$nextTick(() => this.scrollToBottom());
          });
      },
      scrollToBottom() {
        const container = document.getElementById('messageContainer');
        if (container) {
          container.scrollTop = container.scrollHeight;
        }
      },
      goBack() {
        location.href = "/msg-list.html";
      }
    }
  });
</script>
</body>

</html>
